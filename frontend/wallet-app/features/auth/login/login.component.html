<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">◈</div>
      <h1>Welcome back</h1>
      <p>Sign in to your WalletPay account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="form-group">
        <label>Email address</label>
        <input
          type="email"
          formControlName="email"
          placeholder="you@example.com"
          autocomplete="email"/>
        <span class="form-error" *ngIf="email.touched && email.invalid">
          Please enter a valid email address.
        </span>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="input-with-toggle">
          <input
            [type]="showPass ? 'text' : 'password'"
            formControlName="password"
            placeholder="Your password"
            autocomplete="current-password"/>
          <button type="button" class="toggle-pass" (click)="showPass = !showPass">
            {{ showPass ? '🙈' : '👁' }}
          </button>
        </div>
        <span class="form-error" *ngIf="password.touched && password.invalid">
          Password is required.
        </span>
      </div>

      <button type="submit" class="btn btn-primary w-full" [disabled]="loading">
        <span *ngIf="!loading">Sign in</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

    </form>

    <p class="auth-footer">
      Don't have an account?
      <a routerLink="/auth/register">Create one</a>
    </p>

  </div>

  <div class="auth-visual">
    <div class="visual-content">
      <div class="visual-stat">
        <span class="stat-label">Secured Transactions</span>
        <span class="stat-value">₹2.4M+</span>
      </div>
      <div class="visual-stat">
        <span class="stat-label">Active Users</span>
        <span class="stat-value">12,400</span>
      </div>
      <div class="visual-stat">
        <span class="stat-label">Rewards Issued</span>
        <span class="stat-value">820K pts</span>
      </div>
    </div>
  </div>
</div>
